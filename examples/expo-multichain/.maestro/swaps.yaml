appId: com.reown.appkit.expomultichain
---
- launchApp:
    clearState: true
- takeScreenshot: swaps/step-00-home-screen
- startRecording:
    path: swaps/swaps-video
    label: "Swaps test"
- runFlow: flows/connect-wallet-flow.yaml
- tapOn:
    id: account-button
- tapOn:
    id: button-swap
- tapOn:
    id: swap-input-source-button
- takeScreenshot: swaps/step-01-no-tokens-found
- assertVisible: No tokens found
- tapOn:
    id: button-back
- tapOn:
    id: button-back
- tapOn:
    id: button-disconnect
- stopRecording

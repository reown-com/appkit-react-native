name: React Native CI/CD

permissions:
  id-token: write
  contents: read

on:
  # push:
  #   branches: [main, development]
  #   paths-ignore:
  #     - "**.md"
  #     - "LICENSE"
  #     - "docs/**"
  # pull_request:
  #   branches: [main, development]
  workflow_dispatch:
    inputs:
      platform:
        type: choice
        description: "Platform to build"
        default: "all"
        options:
          - android
          - ios
          - all

env:
  WORKING_DIRECTORY: examples/expo-multichain

jobs:
  check-skip:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Skip CI check
        run: echo "Proceeding with workflow"

  # Job 1: Build local packages
  build-packages:
    needs: check-skip
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 📦 Install dependencies
        run: yarn install --immutable  # Use yarn for monorepo

      - name: 🔨 Build all packages
        run: yarn build

      - name: 📦 Pack packages
        run: |
          npm pack ./packages/appkit --pack-destination .
          npm pack ./packages/wagmi --pack-destination .
          npm pack ./packages/solana --pack-destination .
          npm pack ./packages/bitcoin --pack-destination .
          # Rename to simpler names
          mv reown-appkit-react-native-*.tgz appkit.tgz
          mv reown-appkit-wagmi-react-native-*.tgz wagmi.tgz
          mv reown-appkit-solana-react-native-*.tgz solana.tgz
          mv reown-appkit-bitcoin-react-native-*.tgz bitcoin.tgz

      - name: 📤 Upload packed packages
        uses: actions/upload-artifact@v4
        with:
          name: packed-packages
          path: |
            appkit.tgz
            wagmi.tgz
            solana.tgz
            bitcoin.tgz
          retention-days: 1

  # Job 2: Build and test PR - Android
  pr-build-test-android:
    needs: build-packages
    timeout-minutes: 60
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'android' || inputs.platform == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚡ Enable KVM
        run: |
          # Allow all users to access KVM for hardware-accelerated virtualization
          # MODE="0666" (rw-rw-rw-) grants read+write access to owner, group, and all users
          # This is required for Android Studio emulator and other virtualization tools to work without sudo
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: ☕ Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/prod-github-actions-react-native-builds-readonly
          aws-region: eu-central-1
      
      - name: Download Android Wallet prod build
        run: |
          aws s3 cp \
            s3://walletconnect.react-native-builds.prod/android/production/wallet-production.apk \
            ${{ env.WORKING_DIRECTORY }}/wallet.apk

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          eas-cache: true
          packager: npm

      - name: 📥 Download packed packages
        uses: actions/download-artifact@v4
        with:
          name: packed-packages
          path: ./packages

      - name: 📦 Install Local Packages in Example App
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          npm install \
            ../../packages/appkit.tgz \
            ../../packages/wagmi.tgz \
            ../../packages/solana.tgz \
            ../../packages/bitcoin.tgz

      - name: 📱 Build Development APK
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          export NODE_OPTIONS="--max_old_space_size=2048"
          eas build --platform android --profile production-apk --local --non-interactive --output=./app-dev.apk
        env:
          NODE_ENV: development

      - name: 🧪 Setup Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: 🤖 Run Android Emulator and Maestro Tests
        uses: reactivecircus/android-emulator-runner@1dcd0090116d15e7c562f8db72807de5e036a4ed
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          ram-size: 4096M
          heap-size: 576M
          emulator-boot-timeout: 900
          profile: pixel_6
          avd-name: maestro_test_device
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save -no-snapshot-load
          script: .github/scripts/run-android-tests.sh ${{ env.WORKING_DIRECTORY }}

      - name: 📦 Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts-android-${{ github.run_id }}
          path: ${{ env.WORKING_DIRECTORY }}/debug-artifacts/
          retention-days: 1
          if-no-files-found: warn

      - name: 📦 Upload Maestro artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts-android-${{ github.run_id }}
          path: |
            ${{ env.WORKING_DIRECTORY }}/.maestro/
            ~/.maestro/tests/**/*
            **/*.mp4
            **/*.mov
            **/*.png
          retention-days: 1
          if-no-files-found: warn

      - name: 📦 Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-android-${{ github.run_id }}
          path: ${{ env.WORKING_DIRECTORY }}/app-dev.apk
          retention-days: 1

      # - name: 📢 Notify build results
      #   if: always()
      #   uses: rtCamp/action-slack-notify@v2
      #   env:
      #     SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}
      #     SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
      #     SLACK_TITLE: PR Build Results - Android
      #     SLACK_MESSAGE: |
      #       PR #${{ github.event.pull_request.number }} Android build ${{ job.status == 'success' && 'passed ✅' || 'failed ❌' }}

  # Job 3: Build and test PR - iOS
  pr-build-test-ios:
    needs: build-packages
    timeout-minutes: 60
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios' || inputs.platform == 'all'))
    runs-on: macos-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/prod-github-actions-react-native-builds-readonly
          aws-region: eu-central-1
      
      - name: 📥 Download and extract iOS Wallet prod build
        run: |
          aws s3 cp \
            s3://walletconnect.react-native-builds.prod/ios/production/wallet-production.ipa \
            ${{ env.WORKING_DIRECTORY }}/wallet.ipa
          cd ${{ env.WORKING_DIRECTORY }}
          unzip -q wallet.ipa
          mv Payload/*.app ./wallet.app

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          eas-cache: true
          packager: npm

      - name: 📥 Download packed packages
        uses: actions/download-artifact@v4
        with:
          name: packed-packages
          path: ./packages

      - name: 📦 Install Local Packages in Example App
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          npm install \
            ../../packages/appkit.tgz \
            ../../packages/wagmi.tgz \
            ../../packages/solana.tgz \
            ../../packages/bitcoin.tgz

      - name: 📱 Build Development App
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          export NODE_OPTIONS="--max_old_space_size=2048"
          eas build --platform ios --profile production-simulator --local --non-interactive --output=./app-ios-dev.app
        env:
          NODE_ENV: development
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_PASSWORD: ${{ secrets.EXPO_APPLE_PASSWORD }}
          EXPO_TEAM_ID: ${{ secrets.EXPO_TEAM_ID }}

      - name: 🧪 Setup Maestro
        run: |
          brew tap mobile-dev-inc/tap
          brew install maestro

      - name: 📱 Setup iOS Simulator and Run Maestro Tests
        run: .github/scripts/run-ios-tests.sh ${{ env.WORKING_DIRECTORY }}

      - name: 📦 Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts-ios-${{ github.run_id }}
          path: ${{ env.WORKING_DIRECTORY }}/debug-artifacts/
          retention-days: 1
          if-no-files-found: warn

      - name: 📦 Upload Maestro artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts-ios-${{ github.run_id }}
          path: |
            ${{ env.WORKING_DIRECTORY }}/.maestro/
            ~/.maestro/tests/**/*
            **/*.mp4
            **/*.mov
            **/*.png
          retention-days: 1
          if-no-files-found: warn

      - name: 📦 Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-ios-${{ github.run_id }}
          path: ${{ env.WORKING_DIRECTORY }}/app-ios-dev.app
          retention-days: 1

      # - name: 📢 Notify build results
      #   if: always()
      #   uses: rtCamp/action-slack-notify@v2
      #   env:
      #     SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}
      #     SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
      #     SLACK_TITLE: PR Build Results - iOS
      #     SLACK_MESSAGE: |
      #       PR #${{ github.event.pull_request.number }} iOS build ${{ job.status == 'success' && 'passed ✅' || 'failed ❌' }}

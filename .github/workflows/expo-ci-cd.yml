name: React Native CI/CD

permissions:
  id-token: write
  contents: read

on:
  # push:
  #   branches: [main, development]
  #   paths-ignore:
  #     - "**.md"
  #     - "LICENSE"
  #     - "docs/**"
  # pull_request:
  #   branches: [main, development]
  workflow_dispatch:
    inputs:
      platform:
        type: choice
        description: "Platform to build"
        default: "all"
        options:
          - android
          - ios
          - all

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
  EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
  EXPO_APPLE_PASSWORD: ${{ secrets.EXPO_APPLE_PASSWORD }}
  EXPO_TEAM_ID: ${{ secrets.EXPO_TEAM_ID }}
  SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
  NODE_OPTIONS: --openssl-legacy-provider
  WORKING_DIRECTORY: examples/expo-multichain

jobs:
  check-skip:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Skip CI check
        run: echo "Proceeding with workflow"

  # Job 1: Linting for all PRs and pushes
  lint:
    needs: check-skip
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 Run ESLint
        run: npm run lint

      # - name: 📢 Notify lint results
      #   if: always()
      #   uses: rtCamp/action-slack-notify@v2
      #   env:
      #     SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}
      #     SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
      #     SLACK_TITLE: Lint Results
      #     SLACK_MESSAGE: Linting ${{ job.status == 'success' && 'passed ✅' || 'failed ❌' }}

  # Job 2: Build local packages
  build-packages:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "yarn"  # Changed to yarn

      - name: 📦 Install dependencies
        run: yarn install --immutable  # Use yarn for monorepo

      - name: 🔨 Build all packages
        run: yarn build  # Use yarn build command

      - name: 📦 Pack packages
        run: |
          npm pack ./packages/appkit --pack-destination .
          npm pack ./packages/wagmi --pack-destination .
          npm pack ./packages/solana --pack-destination .
          npm pack ./packages/bitcoin --pack-destination .
          # Rename to simpler names
          mv reown-appkit-react-native-*.tgz appkit.tgz
          mv reown-appkit-wagmi-react-native-*.tgz wagmi.tgz
          mv reown-appkit-solana-react-native-*.tgz solana.tgz
          mv reown-appkit-bitcoin-react-native-*.tgz bitcoin.tgz

      - name: 📤 Upload packed packages
        uses: actions/upload-artifact@v4
        with:
          name: packed-packages
          path: |
            appkit.tgz
            wagmi.tgz
            solana.tgz
            bitcoin.tgz
          retention-days: 1

  # Job 3: Build and test PR - Android
  pr-build-test-android:
    needs: [lint, publish-snapshot]
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'android' || inputs.platform == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⚡ Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: ☕ Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.aws-account-id }}:role/prod-github-actions-react-native-builds-readonly
          aws-region: eu-central-1
      
      - name: Download Android Wallet prod build
        run: |
          aws s3 cp \
            s3://walletconnect.react-native-builds.prod/android/production/wallet-production.apk \
            ${{ env.WORKING_DIRECTORY }}/wallet.apk

      - name: 📦 Install dependencies
        run: |
          npm ci
          npm install -g eas-cli@latest

      - name: 📱 Setup EAS build cache
        uses: actions/cache@v4
        with:
          path: ~/.eas-build-local
          key: ${{ runner.os }}-eas-build-android-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-eas-build-android-

      - name: 🔄 Verify EAS CLI installation
        run: eas --version

      - name: 📥 Download packed packages
        uses: actions/download-artifact@v4
        with:
          name: packed-packages
          path: ./packages

      - name: 📦 Install Local Packages in Example App
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          # npm install works with .tgz files from either yarn or npm pack
          npm install \
            ../../appkit.tgz \
            ../../wagmi.tgz \
            ../../solana.tgz \
            ../../bitcoin.tgz

      - name: 📱 Build Development APK with Snapshot
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          export NODE_OPTIONS="--openssl-legacy-provider --max_old_space_size=4096"
          eas build --platform android --profile production-apk --local --non-interactive --output=./app-dev.apk
        env:
          NODE_ENV: development

      - name: 🧪 Setup Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: 🤖 Run Android Emulator and Maestro Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          ram-size: 4096M
          heap-size: 576M
          emulator-boot-timeout: 900
          profile: pixel_6
          avd-name: maestro_test_device
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save -no-snapshot-load
          script: |
            set -x
            
            # Setup debug directory
            mkdir -p ${{ env.WORKING_DIRECTORY }}/debug-artifacts
            
            # Wait for emulator to be fully ready
            echo "Waiting for emulator to be ready..."
            adb wait-for-device
            
            # Wait for boot completion
            echo "Waiting for boot completion..."
            adb shell 'while [ "$(getprop sys.boot_completed)" != "1" ]; do sleep 2; done'
            echo "Boot completed!"
            adb devices
            
            # Clear and start logcat capture
            adb logcat -c
            adb logcat > ${{ env.WORKING_DIRECTORY }}/debug-artifacts/full-logcat.txt &
            LOGCAT_PID=$!
            
            # Install app
            echo "Installing APK..."
            adb install -r ${{ env.WORKING_DIRECTORY }}/app-dev.apk
            adb install -r ${{ env.WORKING_DIRECTORY }}/wallet.apk
            
            # Verify installation
            echo "Verifying app installation..."
            adb shell pm list packages | grep "com.reown.appkit.expomultichain" || (echo "ERROR: App not installed correctly" && exit 1)
            adb shell pm list packages | grep "com.walletconnect.web3modal.rnsample" || (echo "ERROR: Wallet not installed correctly" && exit 1)
            
            # Check APK info
            echo "Checking APK details:"
            adb shell dumpsys package com.reown.appkit.expomultichain | grep -A 5 "versionName" || true
            
            # Clear app data for clean state
            echo "Clearing app data..."
            adb shell pm clear com.reown.appkit.expomultichain || true
                      
            # Wait for system to settle
            sleep 5
            
            # Capture debug info before tests
            echo "=== CAPTURING DEBUG INFO ==="
            
            # Network state (critical for WalletConnect)
            echo "Network state:" > ${{ env.WORKING_DIRECTORY }}/debug-artifacts/network_state.txt
            adb shell dumpsys connectivity >> ${{ env.WORKING_DIRECTORY }}/debug-artifacts/network_state.txt
            adb shell settings get global airplane_mode_on >> ${{ env.WORKING_DIRECTORY }}/debug-artifacts/network_state.txt
            
            # Memory info
            adb shell dumpsys meminfo com.reown.appkit.expomultichain > ${{ env.WORKING_DIRECTORY }}/debug-artifacts/meminfo.txt || true
            
            # App process info
            adb shell ps | grep reown > ${{ env.WORKING_DIRECTORY }}/debug-artifacts/processes.txt || true
            
            # Try manual app launch to verify
            echo "Attempting manual app launch..."
            adb shell monkey -p com.reown.appkit.expomultichain -c android.intent.category.LAUNCHER 1
            sleep 5
            
            # Check if app is running
            adb shell ps | grep -q "com.reown.appkit.expomultichain" || echo "WARNING: App may not be running"
            
            # Take screenshot before tests
            adb shell screencap /sdcard/app_state_before_maestro.png
            adb pull /sdcard/app_state_before_maestro.png ${{ env.WORKING_DIRECTORY }}/debug-artifacts/ || true
            
            # Check current activity
            echo "Current activity before Maestro:"
            adb shell dumpsys activity activities | grep -E "mResumedActivity|mFocusedActivity" || true
            
            echo "=== RUNNING MAESTRO TESTS ==="
            
            # Run Maestro tests
            ~/.maestro/bin/maestro test ${{ env.WORKING_DIRECTORY }}/.maestro/basic-smoke-test.yaml || (echo "Basic test failed" && exit 1)
            ~/.maestro/bin/maestro test ${{ env.WORKING_DIRECTORY }}/.maestro/wallet-qr-load.yaml || (echo "Wallet QR load test failed" && exit 1)
            ~/.maestro/bin/maestro test ${{ env.WORKING_DIRECTORY }}/.maestro/connect-wallet.yaml || (echo "Connect wallet test failed" && exit 1)
            
            echo "All tests passed!"
            
            # Check for crashes
            echo "Checking for crashes..."
            adb logcat -d | grep -E "FATAL EXCEPTION|AndroidRuntime|Process:.*com.reown" > ${{ env.WORKING_DIRECTORY }}/debug-artifacts/crashes.txt || echo "No crashes found" > ${{ env.WORKING_DIRECTORY }}/debug-artifacts/crashes.txt
            
            # Kill logcat capture
            kill $LOGCAT_PID || true

      - name: 📦 Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts-android-${{ github.event.pull_request.number }}
          path: ${{ env.WORKING_DIRECTORY }}/debug-artifacts/
          retention-days: 7
          if-no-files-found: warn

      - name: 📦 Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts-android-${{ github.event.pull_request.number }}
          path: |
            ${{ env.WORKING_DIRECTORY }}/.maestro/
            ~/.maestro/tests/**/*
            **/*.mp4
            **/*.mov
            **/*.png
          retention-days: 7
          if-no-files-found: warn

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-build-android-${{ github.event.pull_request.number }}
          path: ${{ env.WORKING_DIRECTORY }}/app-dev.apk
          retention-days: 7

      # - name: 📢 Notify build results
      #   if: always()
      #   uses: rtCamp/action-slack-notify@v2
      #   env:
      #     SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}
      #     SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
      #     SLACK_TITLE: PR Build Results - Android
      #     SLACK_MESSAGE: |
      #       PR #${{ github.event.pull_request.number }} Android build ${{ job.status == 'success' && 'passed ✅' || 'failed ❌' }}
      #       Snapshot: ${{ needs.publish-snapshot.outputs.snapshot-tag }}

  # Job 4: Build and test PR - iOS
  pr-build-test-ios:
    needs: publish-snapshot
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios' || inputs.platform == 'all'))
    runs-on: macos-latest
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.aws-account-id }}:role/prod-github-actions-react-native-builds-readonly
          aws-region: eu-central-1
      
      - name: 📥 Download and extract iOS Wallet prod build
        run: |
          aws s3 cp \
            s3://walletconnect.react-native-builds.prod/ios/production/wallet-production.ipa \
            ${{ env.WORKING_DIRECTORY }}/wallet.ipa
          cd ${{ env.WORKING_DIRECTORY }}
          unzip -q wallet.ipa
          mv Payload/*.app ./wallet.app

      - name: 📦 Install dependencies
        run: |
          npm ci
          npm install -g eas-cli@latest

      - name: 📱 Setup EAS build cache
        uses: actions/cache@v4
        with:
          path: ~/.eas-build-local
          key: ${{ runner.os }}-eas-build-ios-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-eas-build-ios-

      - name: 🔄 Verify EAS CLI installation
        run: eas --version

      - name: 📥 Download packed packages
        uses: actions/download-artifact@v4
        with:
          name: packed-packages
          path: ./packages

      - name: 📦 Install Local Packages in Example App
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          # npm install works with .tgz files from either yarn or npm pack
          npm install \
            ../../packages/appkit.tgz \
            ../../packages/wagmi.tgz \
            ../../packages/solana.tgz \
            ../../packages/bitcoin.tgz

      - name: 📱 Build Development App with Snapshot
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          export NODE_OPTIONS="--openssl-legacy-provider --max_old_space_size=4096"
          eas build --platform ios --profile production-simulator --local --non-interactive --output=./app-ios-dev.app
        env:
          NODE_ENV: development

      - name: 🧪 Setup Maestro
        run: |
          brew tap mobile-dev-inc/tap
          brew install maestro

      - name: 📱 Setup iOS Simulator and Run Maestro Tests
        run: |
          set -x
          
          # Setup debug directory
          mkdir -p ${{ env.WORKING_DIRECTORY }}/debug-artifacts
          
          # Setup simulator
          SIM_DEVICE_NAME="iPhone-15-Maestro-Test"
          SIM_DEVICE_TYPE="iPhone 15"
          
          # Find iOS runtime (prefer iOS 18, fallback to latest available)
          SIM_RUNTIME_ID=$(xcrun simctl list runtimes | grep -E "iOS 18" | awk '{print $NF}' | head -n 1)
          if [ -z "$SIM_RUNTIME_ID" ]; then
            echo "No suitable iOS runtime found. Using default."
            SIM_RUNTIME_ID=$(xcrun simctl list runtimes | grep "iOS" | awk '{print $NF}' | tail -n 1)
          fi
          
          echo "Using iOS runtime: $SIM_RUNTIME_ID"
          
          # Create or get existing simulator
          UDID=$(xcrun simctl create "$SIM_DEVICE_NAME" "$SIM_DEVICE_TYPE" "$SIM_RUNTIME_ID" 2>/dev/null || xcrun simctl list devices | grep "$SIM_DEVICE_NAME" | grep -oE '\([0-9A-F-]+\)' | tr -d '()')
          
          echo "Simulator UDID: $UDID"
          
          # Boot the simulator
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          
          # Export UDID for Maestro
          export MAESTRO_IOS_DEVICE="$UDID"
          
          # Wait for simulator to be fully ready
          sleep 5
          
          # Install app
          echo "Installing app on simulator..."
          xcrun simctl install "$UDID" ${{ env.WORKING_DIRECTORY }}/app-ios-dev.app
          xcrun simctl install "$UDID" ${{ env.WORKING_DIRECTORY }}/wallet.app
          
          # Verify installation
          echo "Verifying app installation..."
          xcrun simctl listapps "$UDID" | grep -i "expomultichain" || (echo "ERROR: App not installed correctly" && exit 1)
          
          # Get app bundle info
          echo "App bundle info:" > ${{ env.WORKING_DIRECTORY }}/debug-artifacts/app_info.txt
          xcrun simctl listapps "$UDID" | grep -A 10 "expomultichain" >> ${{ env.WORKING_DIRECTORY }}/debug-artifacts/app_info.txt || true
          
          # Grant permissions
          echo "Granting permissions..."
          xcrun simctl privacy "$UDID" grant all com.reown.appkit.expomultichain || true
          
          # Clear app data for clean state
          echo "Clearing app data..."
          xcrun simctl uninstall "$UDID" com.reown.appkit.expomultichain 2>/dev/null || true
          xcrun simctl install "$UDID" ${{ env.WORKING_DIRECTORY }}/app-ios-dev.app
          
          # Wait for system to settle
          sleep 5
          
          # Capture debug info before tests
          echo "=== CAPTURING DEBUG INFO ==="
          
          # Device status
          xcrun simctl status_bar "$UDID" list > ${{ env.WORKING_DIRECTORY }}/debug-artifacts/device_status.txt || true
          
          # Take screenshot before tests
          xcrun simctl io "$UDID" screenshot ${{ env.WORKING_DIRECTORY }}/debug-artifacts/app_state_before_maestro.png || true
          
          # Try to launch the app manually
          echo "Attempting manual app launch..."
          xcrun simctl launch "$UDID" com.reown.appkit.expomultichain || echo "Manual launch returned error, continuing..."
          sleep 5
          
          # Take another screenshot after launch
          xcrun simctl io "$UDID" screenshot ${{ env.WORKING_DIRECTORY }}/debug-artifacts/app_state_after_launch.png || true
          
          echo "=== RUNNING MAESTRO TESTS ==="
          
          # Run Maestro tests
          maestro test ${{ env.WORKING_DIRECTORY }}/.maestro/basic-smoke-test.yaml || (echo "Basic test failed" && exit 1)
          maestro test ${{ env.WORKING_DIRECTORY }}/.maestro/wallet-qr-load.yaml || (echo "Wallet QR load test failed" && exit 1)
          maestro test ${{ env.WORKING_DIRECTORY }}/.maestro/connect-wallet.yaml || (echo "Connect wallet test failed" && exit 1)
          
          echo "All tests passed!"
          
          # Capture final state
          xcrun simctl io "$UDID" screenshot ${{ env.WORKING_DIRECTORY }}/debug-artifacts/app_state_after_tests.png || true

      - name: 📦 Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts-ios-${{ github.event.pull_request.number }}
          path: ${{ env.WORKING_DIRECTORY }}/debug-artifacts/
          retention-days: 7
          if-no-files-found: warn

      - name: 📦 Upload Maestro artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts-ios-${{ github.event.pull_request.number }}
          path: |
            ${{ env.WORKING_DIRECTORY }}/.maestro/
            ~/.maestro/tests/**/*
            **/*.mp4
            **/*.mov
            **/*.png
          retention-days: 7
          if-no-files-found: warn

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-build-ios-${{ github.event.pull_request.number }}
          path: ${{ env.WORKING_DIRECTORY }}/app-ios-dev.app
          retention-days: 7

      # - name: 📢 Notify build results
      #   if: always()
      #   uses: rtCamp/action-slack-notify@v2
      #   env:
      #     SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}
      #     SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
      #     SLACK_TITLE: PR Build Results - iOS
      #     SLACK_MESSAGE: |
      #       PR #${{ github.event.pull_request.number }} iOS build ${{ job.status == 'success' && 'passed ✅' || 'failed ❌' }}
      #       Snapshot: ${{ needs.publish-snapshot.outputs.snapshot-tag }}
